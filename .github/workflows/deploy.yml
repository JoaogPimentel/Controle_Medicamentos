name: Deploy Frontend

on:
  push:
    branches:
      - main

# Necessário para o peaceiris/actions-gh-pages conseguir publicar a branch
# gh-pages com o GITHUB_TOKEN (por padrão o token é somente-leitura).
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        # VITE_API_BASE aponta o front hospedado para a API local. Pode ser
        # sobrescrito por uma Repository variable chamada API_BASE.
        env:
          VITE_API_BASE: ${{ vars.API_BASE || 'http://localhost:8080' }}
        run: npm run build

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
