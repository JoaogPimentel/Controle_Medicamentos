services:
  db:
    image: postgres:16-alpine
    container_name: controle_medicamentos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devweb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Persistência dos dados entre reinicializações.
      - pgdata:/var/lib/postgresql/data
      # Executado apenas no primeiro start (volume vazio): cria todo o schema.
      - ./sql/database.sql:/docker-entrypoint-initdb.d/01_database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-devweb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
